<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Surfers 3D - Мансик Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #fff;
        }
        #loading h1 {
            font-size: 42px;
            background: linear-gradient(45deg, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px #f1c40f); }
            50% { filter: drop-shadow(0 0 30px #e67e22); }
        }
        #loading .loader {
            width: 60px;
            height: 60px;
            border: 5px solid #333;
            border-top: 5px solid #f1c40f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        #loading p {
            margin-top: 20px;
            font-size: 18px;
            color: #aaa;
        }
        #loading .progress-bar {
            width: 200px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
        }
        #loading .progress {
            height: 100%;
            background: linear-gradient(90deg, #f1c40f, #e67e22);
            width: 0%;
            transition: width 0.3s;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 0 #1b4f8b, 1px 1px 0 black;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            display: flex;
            gap: 30px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 2px solid #ffc164;
        }
        .score-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .coin-icon {
            font-size: 28px;
            filter: drop-shadow(2px 2px 0 #a86800);
        }
        #restartBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #efc47b 0%, #d4a55a 100%);
            border: none;
            font-weight: bold;
            font-size: 24px;
            padding: 12px 40px;
            border-radius: 60px;
            border-bottom: 6px solid #996633;
            color: #2d1f0c;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 8px 0 #6b4c28;
            z-index: 100;
            letter-spacing: 2px;
        }
        #restartBtn:active {
            transform: translateX(-50%) translateY(4px);
            border-bottom-width: 2px;
            box-shadow: 0 4px 0 #6b4c28;
        }
        #controls-hint {
            position: absolute;
            bottom: 100px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 40px;
            font-size: 18px;
            backdrop-filter: blur(4px);
            border: 2px solid #ffb347;
            z-index: 100;
            text-align: center;
            line-height: 1.6;
        }
        #inversion-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 20px;
            border: 3px solid #ffaa00;
            cursor: pointer;
            z-index: 200;
            backdrop-filter: blur(5px);
            transition: 0.2s;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,170,0,0.5);
        }
        #inversion-toggle.inverted {
            background: linear-gradient(180deg, #ff5500, #cc3300);
            border-color: #ff0000;
            box-shadow: 0 0 30px #ff0000;
        }
        #inversion-status {
            position: absolute;
            top: 100px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffaa00;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 18px;
            border: 2px solid #ffaa00;
            z-index: 200;
            font-weight: bold;
            transition: 0.3s;
        }
        #action-hint {
            position: absolute;
            bottom: 220px;
            right: 20px;
            color: #ffaa00;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 18px;
            border: 2px solid #ffaa00;
            z-index: 200;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.7; transform: scale(1); }
        }
        #roll-hint {
            position: absolute;
            bottom: 180px;
            right: 20px;
            color: #55ff55;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 18px;
            border: 2px solid #55ff55;
            z-index: 200;
            font-weight: bold;
        }
        #error-message {
            position: absolute;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            display: none;
            z-index: 300;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1>SUBWAY SURFERS 3D</h1>
        <div class="loader"></div>
        <p id="loading-text">Загрузка моделей...</p>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>
    
    <div id="info">
        <div class="score-item">
            <span class="coin-icon">$$</span>
            <span id="coinCounter">0</span>
        </div>
        <div class="score-item">
            <span>~~</span>
            <span id="distanceCounter">0</span>
        </div>
    </div>
    
    <button id="restartBtn">НОВАЯ ИГРА</button>
    
    <div id="controls-hint">
        < > Или A/D для движения<br>
        Пробел для ^ или прыжка<br>
        CTRL для v или присяга<br>
        Нажми пробел чтобы начать!
    </div>

    <div id="inversion-toggle">ИНВЕРСИЯ: ВЫКЛ</div>
    <div id="inversion-status">ЖИЗНЬ: ОБЫЧНАЯ</div>
    <div id="action-hint">ПРЫЖОК: ПРОБЕЛ</div>
    <div id="roll-hint">ПРИСЯГ: CTRL</div>
    
    <div id="error-message"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const GITHUB_BASE = 'https://raw.githubusercontent.com/Ridal33/sabs/main/';

        let carModel = null;
        let trainModel = null;
        let buildingModels = [];
        let loadedCount = 0;
        const totalModels = 5;

        const progressBar = document.getElementById('progress');
        const loadingText = document.getElementById('loading-text');

        function updateProgress(text) {
            loadedCount++;
            const percent = (loadedCount / totalModels) * 100;
            progressBar.style.width = percent + '%';
            loadingText.textContent = text;
        }

        const loader = new GLTFLoader();

        loader.load(GITHUB_BASE + 'lada_priora_vaz_sedan.glb', (gltf) => {
            carModel = gltf.scene;
            carModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            carModel.scale.set(0.5, 0.5, 0.5);
            carModel.rotation.y = Math.PI / 2;
            updateProgress('Машина загружена! Загрузка поезда...');
        }, undefined, (error) => {
            console.error('Error loading car:', error);
            updateProgress('Ошибка загрузки машины, используем запасной вариант...');
        });

        loader.load(GITHUB_BASE + 'train-electric-subway-a.glb', (gltf) => {
            trainModel = gltf.scene;
            trainModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            trainModel.scale.set(0.4, 0.4, 0.4);
            updateProgress('Поезд загружен! Загрузка зданий...');
        }, undefined, (error) => {
            console.error('Error loading train:', error);
            updateProgress('Ошибка загрузки поезда, используем запасной вариант...');
        });

        const buildingNames = ['building-a.glb', 'building-b.glb', 'building-c.glb', 'building-d.glb'];
        let buildingsLoaded = 0;
        
        buildingNames.forEach((name, index) => {
            loader.load(GITHUB_BASE + name, (gltf) => {
                buildingModels[index] = gltf.scene;
                buildingModels[index].traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                buildingModels[index].scale.set(0.8, 0.8, 0.8);
                buildingsLoaded++;
                if (buildingsLoaded === buildingNames.length) {
                    updateProgress('Все модели загружены! Запуск игры...');
                    setTimeout(() => {
                        document.getElementById('loading').style.display = 'none';
                    }, 500);
                }
            }, undefined, (error) => {
                console.error('Error loading building:', name, error);
                buildingsLoaded++;
                if (buildingsLoaded === buildingNames.length) {
                    updateProgress('Здания частично загружены...');
                    setTimeout(() => {
                        document.getElementById('loading').style.display = 'none';
                    }, 500);
                }
            });
        });

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 80, 250);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 9, 18);
        camera.lookAt(0, 3, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(20, 30, 20);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        const d = 60;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 200;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x8090a0);
        scene.add(ambientLight);

        const fillLight = new THREE.PointLight(0x88aaff, 0.6);
        fillLight.position.set(-10, 10, 20);
        scene.add(fillLight);

        const LANE_POSITIONS = [-5, 0, 5];
        const LANE_COUNT = 3;
        const PLAYER_SPEED = 0.5;
        const SPAWN_DISTANCE = 100;
        const DESPAWN_DISTANCE = -50;
        
        const GRAVITY = 0.025;
        const JUMP_FORCE = 0.8;
        const GROUND_Y = 0;
        const TRAIN_TOP_Y = 1.2;
        const BARRIER_HEIGHT = 1.0;
        const BARRIER_WIDTH = 3;
        const BARRIER_DEPTH = 0.5;

        let playerLane = 1;
        let playerModel;
        let playerVelocityY = 0;
        let isJumping = false;
        let isRolling = false;
        let rollTimer = 0;
        const ROLL_DURATION = 30;
        let playerY = GROUND_Y;
        let onTrain = false;
        let currentTrain = null;
        let isOnGround = true;
        
        let canJump = true;
        
        let coins = [];
        let obstacles = [];
        let barriers = [];
        let buildings = [];
        let backgroundBuildings = [];
        
        let coinsCollected = 0;
        let distance = 0;
        let gameActive = true;
        let gameOver = false;
        
        let frame = 0;

        let inversionEnabled = false;
        const inversionToggle = document.getElementById('inversion-toggle');
        const inversionStatus = document.getElementById('inversion-status');

        function createPlayer() {
            if (carModel) {
                const model = carModel.clone();
                model.position.set(LANE_POSITIONS[playerLane], GROUND_Y + 0.3, 0);
                model.rotation.y = Math.PI / 2;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                return model;
            }
            
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.BoxGeometry(2, 1, 4);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.7;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            const roofGeo = new THREE.BoxGeometry(1.6, 0.8, 2);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 1.5;
            roof.castShadow = true;
            group.add(roof);
            
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x333355, transparent: true, opacity: 0.8 });
            const frontWindow = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 0.1), windowMat);
            frontWindow.position.set(0, 1.4, 1);
            group.add(frontWindow);
            
            const backWindow = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 0.1), windowMat);
            backWindow.position.set(0, 1.4, -1);
            group.add(backWindow);
            
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            
            [[-1.2, 0.4, 1.3], [1.2, 0.4, 1.3], [-1.2, 0.4, -1.3], [1.2, 0.4, -1.3]].forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(...pos);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            group.position.set(LANE_POSITIONS[playerLane], GROUND_Y, 0);
            group.castShadow = true;
            group.receiveShadow = true;
            
            return group;
        }

        function createObstacle(lane, zPosition) {
            if (trainModel) {
                const model = trainModel.clone();
                model.position.set(LANE_POSITIONS[lane], 0, zPosition);
                model.rotation.y = Math.PI;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                return model;
            }
            
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.BoxGeometry(2.5, 2, 10);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 1;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            const roofGeo = new THREE.BoxGeometry(2.3, 0.3, 9.8);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0xaa2222 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 2.1;
            roof.castShadow = true;
            group.add(roof);
            
            const windowMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 });
            for (let z = -3; z <= 3; z += 2) {
                [-0.6, 0.6].forEach(x => {
                    const window = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.2), windowMat);
                    window.position.set(x, 1, z);
                    group.add(window);
                });
            }
            
            const lightMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0x664400 });
            const light1 = new THREE.Mesh(new THREE.SphereGeometry(0.2), lightMat);
            light1.position.set(-0.7, 0.5, 4.8);
            group.add(light1);
            
            const light2 = new THREE.Mesh(new THREE.SphereGeometry(0.2), lightMat);
            light2.position.set(0.7, 0.5, 4.8);
            group.add(light2);
            
            group.position.set(LANE_POSITIONS[lane], 0, zPosition);
            
            return group;
        }

        function createBarrier(lane, zPosition) {
            const group = new THREE.Group();
            
            const barGeo = new THREE.BoxGeometry(3.5, 0.3, 1);
            const barMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
            const bar = new THREE.Mesh(barGeo, barMat);
            bar.position.y = BARRIER_HEIGHT;
            bar.castShadow = true;
            bar.receiveShadow = true;
            group.add(bar);
            
            const pillarGeo = new THREE.CylinderGeometry(0.15, 0.25, 1.3);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0xcc5500 });
            
            const pillarLeft = new THREE.Mesh(pillarGeo, pillarMat);
            pillarLeft.position.set(-1.7, 0.65, 0);
            pillarLeft.castShadow = true;
            group.add(pillarLeft);
            
            const pillarRight = new THREE.Mesh(pillarGeo, pillarMat);
            pillarRight.position.set(1.7, 0.65, 0);
            pillarRight.castShadow = true;
            group.add(pillarRight);
            
            const signMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const signLeft = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.1), signMat);
            signLeft.position.set(-1.7, 1.35, 0.2);
            group.add(signLeft);
            
            const signRight = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.1), signMat);
            signRight.position.set(1.7, 1.35, 0.2);
            group.add(signRight);
            
            group.position.set(LANE_POSITIONS[lane], 0, zPosition);
            
            return group;
        }

        function createCoin(lane, zPosition) {
            const group = new THREE.Group();
            
            const coinGeo = new THREE.TorusGeometry(0.4, 0.12, 16, 32);
            const coinMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x664400, metalness: 0.8, roughness: 0.2 });
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.rotation.x = Math.PI / 2;
            coin.castShadow = true;
            group.add(coin);
            
            const glowGeo = new THREE.SphereGeometry(0.15);
            const glowMat = new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0x442200 });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.set(0.2, 0.2, 0.05);
            group.add(glow);
            
            group.position.set(LANE_POSITIONS[lane], 1.2, zPosition);
            
            return group;
        }

        function createBuildingSide(xPos, zStart, count) {
            for (let i = 0; i < count; i++) {
                const idx = Math.floor(Math.random() * buildingModels.length);
                if (buildingModels[idx]) {
                    const building = buildingModels[idx].clone();
                    building.position.set(xPos, 0, zStart + i * 40);
                    building.rotation.y = Math.PI / 2;
                    scene.add(building);
                    backgroundBuildings.push(building);
                }
            }
        }

        function createWorld() {
            const groundGeo = new THREE.PlaneGeometry(50, 3000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.05;
            ground.position.z = 500;
            ground.receiveShadow = true;
            scene.add(ground);
            
            for (let i = 0; i < 3; i++) {
                const railMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.3 });
                
                const railLeft = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 3000), railMat);
                railLeft.position.set(LANE_POSITIONS[i] - 1.8, 0.1, 500);
                railLeft.receiveShadow = true;
                scene.add(railLeft);
                
                const railRight = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 3000), railMat);
                railRight.position.set(LANE_POSITIONS[i] + 1.8, 0.1, 500);
                railRight.receiveShadow = true;
                scene.add(railRight);
                
                const tieMat = new THREE.MeshStandardMaterial({ color: 0x5a4030 });
                for (let z = 0; z < 1500; z += 3) {
                    const tie = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.15, 1), tieMat);
                    tie.position.set(LANE_POSITIONS[i], 0.08, z * 2);
                    tie.receiveShadow = true;
                    scene.add(tie);
                }
            }
            
            createBuildingSide(-18, 0, 40);
            createBuildingSide(18, 20, 40);
            
            const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
            for (let i = 0; i < 100; i++) {
                const cloudGroup = new THREE.Group();
                for (let j = 0; j < 3; j++) {
                    const cloud = new THREE.Mesh(
                        new THREE.SphereGeometry(1 + Math.random() * 2, 8, 8),
                        cloudMat
                    );
                    cloud.position.set(j * 2 - 2, Math.random() * 0.5, Math.random() * 2);
                    cloudGroup.add(cloud);
                }
                cloudGroup.position.set(Math.random() * 80 - 40, 20 + Math.random() * 15, Math.random() * 1500);
                scene.add(cloudGroup);
            }
            
            const sunGeo = new THREE.SphereGeometry(5, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xffff88 });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            sun.position.set(30, 40, -50);
            scene.add(sun);
        }

        createWorld();
        playerModel = createPlayer();
        scene.add(playerModel);

        function isGrounded() {
            return !isJumping && (playerY <= GROUND_Y + 0.1 || onTrain);
        }

        function movePlayer(direction) {
            if (!gameActive || gameOver) return;
            
            let delta = 0;
            
            if (direction === 'left') {
                delta = -1;
            } else if (direction === 'right') {
                delta = 1;
            }
            
            if (inversionEnabled) {
                delta = -delta;
            }
            
            const newLane = playerLane + delta;
            
            if (newLane >= 0 && newLane <= 2) {
                playerLane = newLane;
            }
        }

        function jump() {
            if (!gameActive || gameOver) return;
            
            if (isGrounded() && !isRolling) {
                playerVelocityY = JUMP_FORCE;
                isJumping = true;
                onTrain = false;
                currentTrain = null;
                
                if (playerModel.children.length > 0) {
                    playerModel.rotation.z = -0.15;
                    setTimeout(() => {
                        playerModel.rotation.z = 0;
                    }, 200);
                }
            }
        }

        function roll() {
            if (!gameActive || gameOver) return;
            
            if (isGrounded() && !isJumping) {
                isRolling = true;
                rollTimer = ROLL_DURATION;
                
                playerModel.scale.set(1.2, 0.5, 1.2);
                playerModel.position.y = playerY - 0.3;
            }
        }

        function updateJumpAndCollisions() {
            if (isRolling) {
                rollTimer--;
                if (rollTimer <= 0) {
                    isRolling = false;
                    playerModel.scale.set(1, 1, 1);
                    playerModel.position.y = playerY;
                }
            }
            
            if (isJumping) {
                playerVelocityY -= GRAVITY;
                playerY += playerVelocityY;
                
                let landedOnTrain = false;
                
                for (let obs of obstacles) {
                    const distanceX = Math.abs(obs.position.x - playerModel.position.x);
                    const distanceZ = Math.abs(obs.position.z - playerModel.position.z);
                    
                    if (distanceX < 2 && distanceZ < 5 && playerVelocityY <= 0) {
                        if (playerY <= TRAIN_TOP_Y + 0.3 && playerY > TRAIN_TOP_Y - 0.2) {
                            playerY = TRAIN_TOP_Y;
                            playerVelocityY = 0;
                            isJumping = false;
                            onTrain = true;
                            currentTrain = obs;
                            landedOnTrain = true;
                            break;
                        }
                    }
                }
                
                if (!landedOnTrain && playerY <= GROUND_Y) {
                    playerY = GROUND_Y;
                    playerVelocityY = 0;
                    isJumping = false;
                    onTrain = false;
                    currentTrain = null;
                }
                
                playerModel.position.y = playerY;
            }
            
            if (onTrain && currentTrain) {
                if (!obstacles.includes(currentTrain)) {
                    onTrain = false;
                    currentTrain = null;
                    playerY = GROUND_Y;
                    playerModel.position.y = playerY;
                }
            }
            
            for (let barrier of barriers) {
                const distanceZ = Math.abs(barrier.position.z - playerModel.position.z);
                const distanceX = Math.abs(barrier.position.x - playerModel.position.x);
                
                if (distanceX < 2.5 && distanceZ < 1.0) {
                    if (isJumping && playerY > BARRIER_HEIGHT + 0.3) {
                        continue;
                    }
                    else if (isRolling && playerY < BARRIER_HEIGHT) {
                        continue;
                    }
                    else {
                        gameActive = false;
                        gameOver = true;
                        break;
                    }
                }
            }
            
            if (!onTrain) {
                for (let obs of obstacles) {
                    const distanceZ = Math.abs(obs.position.z - playerModel.position.z);
                    const distanceX = Math.abs(obs.position.x - playerModel.position.x);
                    
                    if (!isJumping && distanceX < 2 && distanceZ < 4.5) {
                        gameActive = false;
                        gameOver = true;
                        break;
                    }
                }
            }
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                e.preventDefault();
                movePlayer('left');
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                e.preventDefault();
                movePlayer('right');
            } else if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                e.preventDefault();
                jump();
            } else if (e.key === 'Control' || e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                e.preventDefault();
                roll();
            }
        });

        let touchStartX = null;
        let touchStartY = null;
        
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        window.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY || !gameActive || gameOver) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 50) {
                if (diffY < 0) jump();
                else roll();
            } else if (Math.abs(diffX) > 50) {
                if (diffX > 0) movePlayer('right');
                else movePlayer('left');
            }
            
            touchStartX = null;
            touchStartY = null;
        });

        inversionToggle.addEventListener('click', () => {
            inversionEnabled = !inversionEnabled;
            
            if (inversionEnabled) {
                inversionToggle.textContent = 'ИНВЕРСИЯ: ВКЛ';
                inversionToggle.classList.add('inverted');
                inversionStatus.textContent = 'ЖИЗНЬ: ИНВЕРСИЯ';
                inversionStatus.style.color = '#ff5500';
                inversionStatus.style.borderColor = '#ff5500';
            } else {
                inversionToggle.textContent = 'ИНВЕРСИЯ: ВЫКЛ';
                inversionToggle.classList.remove('inverted');
                inversionStatus.textContent = 'ЖИЗНЬ: ОБЫЧНАЯ';
                inversionStatus.style.color = '#ffaa00';
                inversionStatus.style.borderColor = '#ffaa00';
            }
        });

        function spawnObjects() {
            if (!gameActive) return;
            
            frame++;
            
            if (frame % 80 === 0) {
                const lane = Math.floor(Math.random() * 3);
                const zPos = playerModel.position.z + SPAWN_DISTANCE + Math.random() * 50;
                const obstacle = createObstacle(lane, zPos);
                scene.add(obstacle);
                obstacles.push(obstacle);
            }
            
            if (frame % 40 === 0) {
                const lane = Math.floor(Math.random() * 3);
                const zPos = playerModel.position.z + SPAWN_DISTANCE + 30 + Math.random() * 40;
                const barrier = createBarrier(lane, zPos);
                scene.add(barrier);
                barriers.push(barrier);
            }
            
            if (frame % 15 === 0) {
                const lane = Math.floor(Math.random() * 3);
                const zPos = playerModel.position.z + SPAWN_DISTANCE + Math.random() * 30;
                const coin = createCoin(lane, zPos);
                scene.add(coin);
                coins.push(coin);
                
                if (Math.random() < 0.6) {
                    const lane2 = (lane + 1) % 3;
                    const coin2 = createCoin(lane2, zPos + 6);
                    scene.add(coin2);
                    coins.push(coin2);
                }
            }
        }

        function updateObjects() {
            if (!gameActive) return;
            
            playerModel.position.z += PLAYER_SPEED;
            distance += PLAYER_SPEED * 2;
            
            playerModel.position.x = LANE_POSITIONS[playerLane];
            
            updateJumpAndCollisions();
            
            coins.forEach(coin => {
                coin.rotation.y += 0.05;
            });
            
            coins = coins.filter(coin => {
                const distanceZ = Math.abs(coin.position.z - playerModel.position.z);
                const distanceX = Math.abs(coin.position.x - playerModel.position.x);
                
                if (distanceX < 1.5 && distanceZ < 2) {
                    scene.remove(coin);
                    coinsCollected++;
                    updateUI();
                    return false;
                }
                return true;
            });
            
            obstacles = obstacles.filter(obs => {
                if (obs.position.z < playerModel.position.z - 70) {
                    scene.remove(obs);
                    return false;
                }
                return true;
            });
            
            barriers = barriers.filter(barrier => {
                if (barrier.position.z < playerModel.position.z - 70) {
                    scene.remove(barrier);
                    return false;
                }
            });
            
            coins = coins.filter(coin => {
                if (coin.position.z < playerModel.position.z - 70) {
                    scene.remove(coin);
                    return false;
                }
                return true;
            });
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('coinCounter').innerText = Math.floor(coinsCollected);
            document.getElementById('distanceCounter').innerText = Math.floor(distance);
        }

        function restartGame() {
            gameActive = true;
            gameOver = false;
            
            obstacles.forEach(obs => scene.remove(obs));
            barriers.forEach(barrier => scene.remove(barrier));
            coins.forEach(coin => scene.remove(coin));
            
            obstacles = [];
            barriers = [];
            coins = [];
            
            coinsCollected = 0;
            distance = 0;
            frame = 0;
            playerLane = 1;
            playerY = GROUND_Y;
            playerVelocityY = 0;
            isJumping = false;
            isRolling = false;
            onTrain = false;
            currentTrain = null;
            
            playerModel.scale.set(1, 1, 1);
            playerModel.position.set(LANE_POSITIONS[1], GROUND_Y + 0.3, 0);
            
            updateUI();
        }

        document.getElementById('restartBtn').addEventListener('click', restartGame);

        function updateCamera() {
            const targetX = playerModel.position.x * 0.4;
            const targetZ = playerModel.position.z - 16;
            const targetY = playerY + 8;
            
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.position.z += (targetZ - camera.position.z) * 0.05;
            
            camera.lookAt(
                playerModel.position.x,
                playerY + 2,
                playerModel.position.z + 12
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (gameActive) {
                spawnObjects();
                updateObjects();
                
                if (!isRolling) {
                    playerModel.rotation.z = Math.sin(Date.now() * 0.003) * 0.03;
                }
                
                if (isJumping) {
                    playerModel.rotation.x = 0.15;
                } else if (!isRolling) {
                    playerModel.rotation.x = 0;
                }
            }
            
            updateCamera();
            
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const gameOverDiv = document.createElement('div');
        gameOverDiv.style.position = 'absolute';
        gameOverDiv.style.top = '50%';
        gameOverDiv.style.left = '50%';
        gameOverDiv.style.transform = 'translate(-50%, -50%)';
        gameOverDiv.style.color = '#f1c40f';
        gameOverDiv.style.fontSize = '72px';
        gameOverDiv.style.fontWeight = 'bold';
        gameOverDiv.style.textShadow = '4px 4px 0 #c0392b, 8px 8px 0 #000';
        gameOverDiv.style.zIndex = '200';
        gameOverDiv.style.display = 'none';
        gameOverDiv.innerText = 'GAME OVER';
        document.body.appendChild(gameOverDiv);
        
        setInterval(() => {
            if (gameOver) {
                gameOverDiv.style.display = 'block';
            } else {
                gameOverDiv.style.display = 'none';
            }
        }, 100);
        
    </script>
</body>
</html>
